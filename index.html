<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NurseAI Pro</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2314b8a6'/><path d='M16 8v16M8 16h16' stroke='white' stroke-width='3' stroke-linecap='round'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+Arabic:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{
  --bg:#fafaf9;--bg2:#f5f5f4;--bg3:#fff;
  --sur:#ffffff;--sur2:#fafaf9;
  --ln:#e7e5e4;--ln2:#d6d3d1;
  --pri:#0d9488;--pri2:#0f766e;--prig:rgba(13,148,136,.05);--pril:rgba(13,148,136,.1);
  --grn:#059669;--grng:#ecfdf5;--red:#dc2626;--redg:#fef2f2;--amb:#b45309;--ambg:#fffbeb;
  --tx:#1c1917;--tx2:#57534e;--tx3:#a8a29e;
  --r:18px;--rs:12px;
  --ff:'Inter','Noto Sans Arabic',system-ui,sans-serif;
  --s1:0 1px 2px rgba(0,0,0,.03);
  --s2:0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.03);
  --s3:0 4px 24px rgba(0,0,0,.06)
}
[lang=ar]{--ff:'Noto Sans Arabic','Inter',system-ui,sans-serif}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--ff);color:var(--tx)}
::selection{background:rgba(13,148,136,.12)}

/* ═══ SPLASH ═══ */
#LS{position:fixed;inset:0;z-index:9999;background:var(–bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:32px}
#LS.gone{display:none}
.ls-glow{display:none}
.ls-badge{background:var(–prig);border:1px solid rgba(13,148,136,.12);border-radius:100px;padding:6px 16px;font-size:9px;font-weight:700;color:var(–pri);letter-spacing:2.5px;text-transform:uppercase}
.ls-icon{width:96px;height:96px;background:none;border:none;box-shadow:none;border-radius:0;display:flex;align-items:center;justify-content:center}
.ls-icon img{border-radius:22px!important;box-shadow:var(–s3)}
.ls-title{font-size:30px;font-weight:900;color:var(–tx);letter-spacing:-1px}
.ls-title span{color:var(–pri)}
.ls-sub{font-size:13px;color:var(–tx3);font-weight:500;letter-spacing:-.1px}
.ls-div{display:flex;align-items:center;gap:12px;width:280px}
.ls-div span{font-size:10px;color:var(–tx3);white-space:nowrap;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.ls-div::before,.ls-div::after{content:’’;flex:1;height:1px;background:var(–ln)}
.ls-cards{display:flex;gap:12px}
.ls-card{width:144px;padding:24px 16px;cursor:pointer;background:#fff;border:1.5px solid var(–ln);border-radius:22px;display:flex;flex-direction:column;align-items:center;gap:10px;box-shadow:var(–s2);transition:all .2s;-webkit-tap-highlight-color:transparent}
.ls-card:active{border-color:var(–pri);transform:scale(.96)}
.ls-card .flag{font-size:34px}
.ls-card .name{font-size:16px;font-weight:800;color:var(–tx)}
.ls-card .sub{font-size:10px;color:var(–tx3);font-weight:500}

/* ═══ APP ═══ */
#APP{display:none;height:100dvh;flex-direction:column;background:var(–bg)}
#APP.show{display:flex}
.header{height:58px;flex-shrink:0;background:rgba(250,250,249,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(–ln);display:flex;align-items:center;padding:0 18px;gap:12px;z-index:50}
.h-logo{width:36px;height:36px;border-radius:11px;overflow:hidden;flex-shrink:0;cursor:pointer;box-shadow:var(–s1)}
.h-logo img{width:100%;height:100%;object-fit:contain}
.h-info{flex:1;min-width:0}
.h-t{font-size:16px;font-weight:800;color:var(–tx);letter-spacing:-.3px}
.h-s{font-size:10px;color:var(–tx3);font-weight:500;margin-top:1px}
.h-r{display:flex;align-items:center;gap:8px;flex-shrink:0}
.lchip{display:flex;align-items:center;gap:5px;background:#fff;border:1px solid var(–ln);border-radius:100px;padding:6px 12px;font-size:10px;font-weight:700;color:var(–tx2);cursor:pointer;box-shadow:var(–s1);-webkit-tap-highlight-color:transparent}
.api-btn{width:36px;height:36px;border:none;border-radius:11px;background:#fff;border:1px solid var(–ln);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(–tx3);position:relative;box-shadow:var(–s1);-webkit-tap-highlight-color:transparent}
.api-btn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round}
.api-ind{position:absolute;bottom:5px;right:5px;width:7px;height:7px;border-radius:50%;background:var(–ln2);border:1.5px solid #fff}
.api-ind.ok{background:var(–grn)}
.api-pop{position:fixed;top:62px;right:14px;width:270px;z-index:500;background:#fff;border:1px solid var(–ln);border-radius:var(–r);padding:18px;box-shadow:var(–s3);display:none}
[dir=ltr] .api-pop{right:auto;left:14px}
.api-pop.open{display:block}
.api-pop h4{font-size:11px;font-weight:800;color:var(–pri);margin-bottom:10px}
.api-pop input{width:100%;background:var(–bg2);border:1px solid var(–ln);color:var(–tx);padding:10px 12px;border-radius:var(–rs);font-family:monospace;font-size:12px;outline:none}
.api-pop input:focus{border-color:var(–pri)}
.api-pop-s{font-size:10px;color:var(–tx3);margin-top:6px}
.content{flex:1;overflow:hidden;position:relative}
.vw{display:none;height:100%;flex-direction:column;overflow:hidden}
.vw.on{display:flex}
.scr{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px;-webkit-overflow-scrolling:touch;padding-bottom:96px}
.scr::-webkit-scrollbar{display:none}

/* ═══ BOTTOM BAR ═══ */
.btabs{position:fixed;bottom:0;left:0;right:0;height:66px;background:rgba(255,255,255,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(–ln);display:flex;align-items:stretch;z-index:100;padding:0;padding-bottom:env(safe-area-inset-bottom,0)}
.bt{flex:1;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(–tx3);-webkit-tap-highlight-color:transparent;position:relative}
.bt.on{color:var(–pri)}
.bt.on::before{content:’’;position:absolute;top:-1px;left:25%;right:25%;height:3px;background:var(–pri);border-radius:0 0 4px 4px}
.bt svg{width:21px;height:21px}
.bt-fill svg{fill:currentColor}
.bt-stroke svg{fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.bt span{font-size:9px;font-weight:700}

/* ═══ SHARED ═══ */
.shr{font-size:11px;font-weight:700;color:var(–tx3);letter-spacing:1px;text-transform:uppercase}
.card{background:#fff;border:1px solid var(–ln);border-radius:var(–r);overflow:hidden;box-shadow:var(–s2)}
.cb{padding:18px}
.inp{width:100%;background:var(–bg2);border:1.5px solid var(–ln);color:var(–tx);padding:12px 14px;border-radius:var(–rs);font-size:14px;font-family:var(–ff);outline:none;transition:border .15s}
.inp:focus{border-color:var(–pri)}
.inp::placeholder{color:var(–tx3)}
select.inp{-webkit-appearance:none;appearance:none}
.lbl{font-size:10px;font-weight:700;color:var(–tx2);margin-bottom:5px;display:block;letter-spacing:.5px;text-transform:uppercase}
.fg{margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;padding:13px;background:var(–pri);border:none;border-radius:var(–rs);color:#fff;font-family:var(–ff);font-size:14px;font-weight:700;cursor:pointer;letter-spacing:-.1px;-webkit-tap-highlight-color:transparent}
.btn:active{opacity:.88}
.btn:disabled{opacity:.3}
.gbtn{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1.5px solid var(–ln);color:var(–tx2);padding:10px 16px;border-radius:var(–rs);font-family:var(–ff);font-size:12px;font-weight:700;cursor:pointer;box-shadow:var(–s1);-webkit-tap-highlight-color:transparent}
.chip{background:#fff;border:1.5px solid var(–ln);color:var(–tx2);padding:8px 16px;border-radius:100px;font-size:12px;font-family:var(–ff);font-weight:600;cursor:pointer;white-space:nowrap;box-shadow:var(–s1);-webkit-tap-highlight-color:transparent}
.chip:active,.chipOn{background:var(–pril);border-color:var(–pri);color:var(–pri)}
.sp{width:16px;height:16px;border:2px solid var(–ln);border-top-color:var(–pri);border-radius:50%;animation:rot .5s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.loading{display:none;flex-direction:column;align-items:center;gap:10px;padding:28px}
.loading.on{display:flex}
.rbox{display:none;background:#fff;border:1px solid var(–ln);border-radius:var(–r);overflow:hidden;box-shadow:var(–s2)}
.rbox.on{display:block}
.rh{padding:12px 18px;border-bottom:1px solid var(–ln);background:var(–bg2)}
.rbadge{font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(–pri);background:var(–prig);padding:4px 10px;border-radius:8px}
.rbody{padding:18px;font-size:14px;line-height:2;color:var(–tx);white-space:pre-wrap;word-break:break-word;overflow-y:visible}

/* ═══ DASHBOARD ═══ */
.hero{background:linear-gradient(145deg,#f0fdfa,#ecfeff,#f0f9ff);border:1px solid rgba(13,148,136,.08);border-radius:20px;padding:24px 20px;position:relative}
.hero::after{content:’’;position:absolute;top:12px;right:16px;width:48px;height:48px;border-radius:14px;background:rgba(13,148,136,.06);display:flex;align-items:center;justify-content:center}
.hero-ttl{font-size:22px;font-weight:900;color:var(–tx);margin-bottom:5px;letter-spacing:-.5px}
.hero-desc{font-size:13px;color:var(–tx2);font-weight:500}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.sc{background:#fff;border:1px solid var(–ln);border-radius:14px;padding:16px 12px;text-align:center;box-shadow:var(–s1)}
.sv{font-size:26px;font-weight:900;color:var(–pri);letter-spacing:-.5px}
.sl{font-size:9px;color:var(–tx3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.qag{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.qa{background:#fff;border:1px solid var(–ln);border-radius:16px;padding:18px;cursor:pointer;box-shadow:var(–s1);transition:transform .15s;-webkit-tap-highlight-color:transparent}
.qa:active{transform:scale(.97)}
.qa h4{font-size:14px;font-weight:800;color:var(–tx);margin-bottom:4px;letter-spacing:-.2px}
.qa p{font-size:11px;color:var(–tx3);font-weight:500}

/* ═══ CHAT ═══ */
.cw{flex:1;display:flex;flex-direction:column;overflow:hidden}
.cm{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.cwelcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center}
.cw-t{font-size:20px;font-weight:900;color:var(–tx);letter-spacing:-.3px}
.cw-s{font-size:13px;color:var(–tx2);max-width:260px;line-height:1.7}
.msg{display:flex;gap:10px;max-width:84%}
.msg.u{flex-direction:row-reverse;align-self:flex-end}
.msg.b{align-self:flex-start}
.av{width:32px;height:32px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px}
.msg.u .av{background:var(–pri);color:#fff}
.msg.b .av{background:var(–bg2);border:1px solid var(–ln);color:var(–pri)}
.bbl{padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.9;white-space:pre-wrap;word-break:break-word}
.msg.u .bbl{background:var(–pri);color:#fff;border-radius:18px 4px 18px 18px}
[dir=ltr] .msg.u .bbl{border-radius:4px 18px 18px 18px}
.msg.b .bbl{background:#fff;border:1px solid var(–ln);border-radius:4px 18px 18px 18px;color:var(–tx);box-shadow:var(–s1)}
.btag{font-size:8px;font-weight:800;color:var(–pri);background:var(–prig);padding:3px 8px;border-radius:6px;margin-bottom:5px;display:inline-block;letter-spacing:.5px}
.tw{display:flex;gap:8px;align-self:flex-start}
.tdw{background:#fff;border:1px solid var(–ln);border-radius:4px 18px 18px 18px;padding:12px 16px;display:flex;gap:4px;box-shadow:var(–s1)}
.td{width:5px;height:5px;border-radius:50%;background:var(–pri);animation:tdot 1.2s infinite}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{opacity:.15}30%{opacity:1}}
.ccr{display:flex;gap:6px;padding:10px 18px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch}
.ccr::-webkit-scrollbar{display:none}
.cia{display:flex;gap:10px;align-items:flex-end;padding:12px 18px;padding-bottom:80px;background:rgba(250,250,249,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(–ln);flex-shrink:0}
.cta{flex:1;background:#fff;border:1.5px solid var(–ln);color:var(–tx);padding:12px 16px;border-radius:16px;font-size:14px;font-family:var(–ff);resize:none;outline:none;max-height:80px;line-height:1.5;box-shadow:var(–s1)}
.cta:focus{border-color:var(–pri)}
.cta::placeholder{color:var(–tx3)}
.send{width:42px;height:42px;flex-shrink:0;background:var(–pri);border:none;border-radius:13px;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.send:active{opacity:.85}
.send svg{width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round}

/* ═══ DOSE ═══ */
.dres{display:none;margin-top:12px;background:#f0fdfa;border:1px solid rgba(13,148,136,.1);border-radius:var(–rs);padding:16px}
.dres.on{display:block}
.dres-v{font-size:24px;font-weight:900;color:var(–pri);margin-bottom:6px;letter-spacing:-.3px}
.dres-s{font-size:13px;color:var(–tx2);line-height:1.85;white-space:pre-wrap}
.dres-w{font-size:11px;color:var(–amb);margin-top:10px;padding-top:10px;border-top:1px solid rgba(180,83,9,.08);font-weight:600}

/* ═══ QUIZ ═══ */
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.tb{background:#fff;border:1.5px solid var(–ln);color:var(–tx3);padding:10px;border-radius:var(–rs);font-family:var(–ff);font-size:11px;font-weight:700;cursor:pointer;text-align:center;box-shadow:var(–s1);-webkit-tap-highlight-color:transparent}
.tb.on{border-color:var(–pri);color:var(–pri);background:var(–prig)}
.qbox{background:#fff;border:1px solid var(–ln);border-radius:var(–r);padding:18px;display:none;box-shadow:var(–s2)}
.qbox.on{display:block}
.qnum{font-size:10px;color:var(–pri);margin-bottom:8px;font-weight:800;letter-spacing:1px}
.qtext{font-size:15px;font-weight:700;line-height:1.85;margin-bottom:14px;color:var(–tx)}
.qchs{display:flex;flex-direction:column;gap:7px}
.qch{background:var(–bg2);border:1.5px solid var(–ln);border-radius:var(–rs);padding:12px 16px;font-family:var(–ff);font-size:13px;color:var(–tx);text-align:right;cursor:pointer;-webkit-tap-highlight-color:transparent}
[dir=ltr] .qch{text-align:left}
.qch.ok{border-color:var(–grn);background:var(–grng);color:#065f46}
.qch.no{border-color:var(–red);background:var(–redg);color:#991b1b}
.qexp{display:none;margin-top:10px;background:#f0fdfa;border:1px solid rgba(13,148,136,.1);border-radius:var(–rs);padding:14px;font-size:13px;line-height:1.9;color:#134e4a}
.qexp.on{display:block}
.srow{display:flex;gap:6px}
.sbdg{background:#fff;border:1px solid var(–ln);border-radius:10px;padding:5px 12px;font-size:11px;color:var(–tx3);font-weight:600;box-shadow:var(–s1)}
.sbdg b{color:var(–pri)}

/* ═══ PROCEDURES ═══ */
.pcg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pcc{background:#fff;border:1px solid var(–ln);border-radius:var(–r);padding:18px;cursor:pointer;box-shadow:var(–s1);transition:transform .15s;-webkit-tap-highlight-color:transparent}
.pcc:active{transform:scale(.97)}
.pcc h4{font-size:14px;font-weight:800;color:var(–tx);margin-bottom:5px}
.pcc p{font-size:10px;color:var(–tx3)}
.pc-cnt{font-size:9px;font-weight:800;color:var(–pri);background:var(–prig);padding:3px 8px;border-radius:8px;margin-top:5px;display:inline-block}
.pl{display:flex;flex-direction:column;gap:8px}
.pi{background:#fff;border:1px solid var(–ln);border-radius:16px;padding:16px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;box-shadow:var(–s1);-webkit-tap-highlight-color:transparent}
.pi:active{background:var(–bg2)}
.pi h4{font-size:14px;font-weight:700;color:var(–tx)}
.ptabs{display:flex;gap:6px;margin-bottom:14px}
.ptab{flex:1;padding:11px;background:#fff;border:1.5px solid var(–ln);border-radius:var(–rs);font-family:var(–ff);font-size:12px;font-weight:700;color:var(–tx3);cursor:pointer;text-align:center;box-shadow:var(–s1);-webkit-tap-highlight-color:transparent}
.ptab.on{background:var(–prig);border-color:var(–pri);color:var(–pri)}
.ptp{display:none}.ptp.on{display:block}
.vidc{width:100%;aspect-ratio:16/9;background:#0f172a;border-radius:16px;overflow:hidden;position:relative;box-shadow:var(–s3)}
.vidc iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
.vid-link{display:block;margin-top:8px;text-align:center;font-size:12px;color:var(–pri);text-decoration:none;font-weight:600}
.ptxt{display:flex;flex-direction:column;gap:10px}
.psec{background:#fff;border:1px solid var(–ln);border-radius:16px;overflow:hidden;box-shadow:var(–s1)}
.psh{padding:12px 18px;border-bottom:1px solid var(–ln);background:var(–bg2)}
.psh-t{font-size:11px;font-weight:800;color:var(–pri);letter-spacing:1.2px;text-transform:uppercase}
.psb{padding:14px 18px;font-size:14px;color:var(–tx);line-height:2;white-space:pre-wrap}
.psteps{display:flex;flex-direction:column;gap:8px}
.pstep{display:flex;gap:12px;align-items:flex-start}
.psn{min-width:28px;height:28px;background:var(–pri);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.pst{font-size:14px;color:var(–tx);line-height:1.9}
.pnote{padding:16px 18px;background:var(–ambg);border:1.5px solid #fef3c7;border-radius:var(–rs);font-size:13px;color:#92400e;line-height:2;font-weight:500}
.pdanger{padding:16px 18px;background:var(–redg);border:1.5px solid #fee2e2;border-radius:var(–rs);font-size:13px;color:#991b1b;line-height:2;font-weight:500}
.pref{padding:12px 18px;background:#f0fdfa;border:1.5px solid #ccfbf1;border-radius:var(–rs);font-size:12px;color:#134e4a;font-weight:600}
.pql{display:flex;flex-direction:column;gap:10px}
.pqi{background:#fff;border:1px solid var(–ln);border-radius:16px;padding:16px;box-shadow:var(–s1)}
.pqn{font-size:9px;color:var(–pri);margin-bottom:6px;font-weight:800;letter-spacing:.5px}
.pqq{font-size:14px;font-weight:700;line-height:1.9;margin-bottom:12px;color:var(–tx)}
.pqcs{display:flex;flex-direction:column;gap:5px}
.pqc{background:var(–bg2);border:1.5px solid var(–ln);border-radius:11px;padding:10px 14px;font-family:var(–ff);font-size:12px;color:var(–tx);text-align:right;cursor:pointer;-webkit-tap-highlight-color:transparent}
[dir=ltr] .pqc{text-align:left}
.pqc.ok{border-color:var(–grn);background:var(–grng);color:#065f46}
.pqc.no{border-color:var(–red);background:var(–redg);color:#991b1b}
.pqe{display:none;margin-top:6px;background:#f0fdfa;border:1px solid rgba(13,148,136,.08);border-radius:10px;padding:10px 14px;font-size:12px;line-height:1.9;color:#134e4a}
.pqe.on{display:block}

/* ═══ VITALS ═══ */

// ═══ GROQ API ═══
function sysPrompt(){
  return "You are NurseAI Pro, the smartest clinical nursing AI. Deep expertise in ALL medical and nursing sciences. LANGUAGE: Auto-detect. Arabic question = Arabic answer. English = English. Keep medical terms in English always. KNOWLEDGE: Brunner and Suddarth, Potter and Perry, Lewis Med-Surg, AHA Guidelines, Mosby, Lexicomp, Lehne Pharmacology, Wong Pediatric, Lowdermilk, Bates, NANDA-I, WHO, CDC, UpToDate, Guyton Physiology, Robbins Pathology, Harrison. FORMAT: Organize with emoji sections. For diseases give: Definition, Pathophysiology, Risk Factors, Signs and Symptoms, Diagnosis with lab values, Nursing Assessment, Nursing Diagnosis NANDA, Interventions with rationale, Medications with doses, Patient Education, Complications, NCLEX Pearl. Be SPECIFIC with numbers and values. Explain WHY not just WHAT. End with Ref and Safety point.";
}
function callGroq(msgs,temp,maxTok){
  if(!S.key)return Promise.reject(new Error(L().noKey2));
  if(!S.key.startsWith("gsk_"))return Promise.reject(new Error("Key must start with gsk_"));
  if(window.location.protocol==="file:")return Promise.reject(new Error(S.lang==="ar"?"Requires deployment":"Requires deployment"));
  return fetch(GROQ,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+S.key},body:JSON.stringify({model:MODEL,messages:msgs,temperature:temp||.15,max_tokens:maxTok||3000})}).then(function(r){
    if(!r.ok)return r.json().catch(function(){return {};}).then(function(e){throw new Error(e.error&&e.error.message||"HTTP "+r.status);});
    return r.json();
  }).then(function(d){
    if(!d.choices||!d.choices[0])throw new Error("Empty response");
    return d.choices[0].message.content;
  }).catch(function(e){
    if(e.message==="Failed to fetch"||e.message==="Load failed"){
      if(MI<MODELS.length-1){MI++;MODEL=MODELS[MI];return callGroq(msgs,temp,maxTok);}
      throw new Error(S.lang==="ar"?"Connection failed":"Connection failed");
    }
    throw e;
  });
}

    secEl.innerHTML="<div class=\"psh\"><div class=\"psh-t\">"+esc(t(sec.h))+"</div></div>";
    var body=document.createElement("div");body.className="psb";
    if(sec.steps){var steps=t(sec.steps);if(Array.isArray(steps)){var sl=document.createElement("div");sl.className="psteps";steps.forEach(function(step,i){var st=document.createElement("div");st.className="pstep";st.innerHTML="<div class=\"psn\">"+(i+1)+"</div><div class=\"pst\">"+esc(step)+"</div>";sl.appendChild(st);});body.appendChild(sl);}}
    else if(sec.b){body.textContent=t(sec.b);}
    secEl.appendChild(body);tc.appendChild(secEl);
  });
  if(proc.notes){var notes=t(proc.notes);if(Array.isArray(notes)&&notes.length){var nb=document.createElement("div");nb.className="pnote";nb.textContent=notes.join("\n");tc.appendChild(nb);}}
  if(proc.danger){var db=document.createElement("div");db.className="pdanger";db.textContent=t(proc.danger);tc.appendChild(db);}
  if(proc.ref){var rb=document.createElement("div");rb.className="pref";rb.textContent="Ref: "+proc.ref;tc.appendChild(rb);}
  tp2.appendChild(tc);s.appendChild(tp2);
  // QUIZ
  var qp=document.createElement("div");qp.className="ptp";qp.id="ptp-quiz";
  if(proc.quiz&&proc.quiz.length){
    var ql=document.createElement("div");ql.className="pql";
    proc.quiz.forEach(function(q,qi){
      var ans=false,item=document.createElement("div");item.className="pqi";
      item.innerHTML="<div class=\"pqn\">Q "+(qi+1)+" / "+proc.quiz.length+"</div><div class=\"pqq\">"+esc(t(q.q))+"</div>";
      var qcs=document.createElement("div");qcs.className="pqcs";
      var choices=t(q.ch);
      if(Array.isArray(choices)){choices.forEach(function(c,ci){
        var btn=document.createElement("button");btn.className="pqc";btn.textContent=c;
        btn.onclick=function(){if(ans)return;ans=true;qcs.querySelectorAll(".pqc").forEach(function(b,i){b.disabled=true;if(i===q.c)b.classList.add("ok");if(i===ci&&ci!==q.c)b.classList.add("no");});item.querySelector(".pqe").textContent=t(q.e);item.querySelector(".pqe").classList.add("on");};
        qcs.appendChild(btn);
      });}
      item.appendChild(qcs);var exp=document.createElement("div");exp.className="pqe";item.appendChild(exp);ql.appendChild(item);
    });qp.appendChild(ql);
  }
  s.appendChild(qp);
}

// ═══ VITALS ═══
var VR={hr:{l:60,h:100},rr:{l:12,h:20},temp:{l:36.5,h:37.5},spo2:{l:95,h:100},gcs:{l:13,h:15},bg:{l:70,h:110}};
var VN={hr:["Bradycardia","Normal","Tachycardia"],rr:["Bradypnea","Normal","Tachypnea"],temp:["Hypothermia","Normal","Fever"],spo2:["Hypoxia","Normal","Normal"],gcs:["Altered LOC","Normal","Normal"],bg:["Hypoglycemia","Normal","Hyperglycemia"]};
function ckv(id,v){
  if(id==="bp"){var sys=parseFloat($("vSys").value),dia=parseFloat($("vDia").value),el=$("vs-bp");if(!sys&&!dia){el.textContent="";el.className="vs";return;}var txt,cls;if(sys>180||dia>120){txt="HTN Crisis";cls="vc2";}else if(sys>140||dia>90){txt="Hypertension";cls="vw2";}else if(sys<90||dia<60){txt="Hypotension";cls="vw2";}else{txt="Normal";cls="vn";}el.textContent=txt;el.className="vs "+cls;return;}
  var val=parseFloat(v),el=$("vs-"+id);if(!val){el.textContent="";el.className="vs";return;}
  var r=VR[id],n=VN[id],txt,cls;
  if(val<r.l){txt=n[0];cls=(id==="spo2"||id==="gcs")?"vc2":"vw2";}else if(val>r.h){txt=n[2];cls="vw2";}else{txt=n[1];cls="vn";}
  el.textContent=txt;el.className="vs "+cls;
}
["vHR","vRR","vT","vSp","vGCS","vBG"].forEach(function(id){
  var el=$(id);if(el)el.oninput=function(){var map={vHR:"hr",vRR:"rr",vT:"temp",vSp:"spo2",vGCS:"gcs",vBG:"bg"};ckv(map[id],this.value);};
});
$("vSys").oninput=function(){ckv("bp");};
$("vDia").oninput=function(){ckv("bp");};

// ═══ INIT ═══
try{var k=localStorage.getItem("naik");if(k){$("apiIn").value=k;S.key=k;$("apiInd").className="api-ind ok";}}catch(e){}
})();
</script>
