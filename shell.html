<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>NurseAI Pro</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230ea5e9'/><path d='M16 8v16M8 16h16' stroke='white' stroke-width='3' stroke-linecap='round'/></svg>">
<!-- fonts loaded locally -->
<style>
*{box-sizing:border-box;margin:0;padding:0}
/* fonts loaded via link tag */
:root{
--bg:#0a0f1a;--bg1:#0d1424;--bg2:#101b2e;--bg3:#162740;
--sur:#152238;--sur2:#1a2c45;
--ln:#243a5c;--ln2:#2d4a72;--ln3:#3a5f8f;
--pri:#3b82f6;--pri2:#2563eb;--pri3:#1d4ed8;--pri4:#1e40af;
--prig:rgba(59,130,246,.1);
--grn:#22c55e;--red:#ef4444;--amb:#f59e0b;--pur:#a78bfa;
--tx:#ffffff;--tx2:#d4e0ec;--tx3:#9fb3c8;
--r:12px;--rs:8px;
--ff:system-ui,-apple-system,'Segoe UI',Roboto,'Noto Sans Arabic',sans-serif
}
[lang=ar]{--ff:'Noto Sans Arabic',system-ui,-apple-system,sans-serif}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--ff)}
body{color:var(--tx)}

/* ─ LANG SCREEN ─ */
#LS{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:20px}
#LS.gone{display:none}
.ls-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.ls-bg::before{content:'';position:absolute;top:-120px;left:50%;width:500px;height:500px;transform:translateX(-50%);background:radial-gradient(circle,rgba(59,130,246,.06),transparent 70%)}
.ls-z{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center}
.ls-badge{display:inline-flex;align-items:center;gap:6px;background:var(--prig);border:1px solid rgba(59,130,246,.2);border-radius:20px;padding:4px 12px;font-size:10px;font-weight:700;color:var(--pri);letter-spacing:1.5px;text-transform:uppercase}
.ls-dot{width:6px;height:6px;border-radius:50%;background:var(--pri);box-shadow:0 0 8px var(--pri)}
.ls-icon{width:80px;height:80px;background:linear-gradient(135deg,var(--pri3),var(--pri4));border-radius:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 50px rgba(59,130,246,.2),0 0 0 1px rgba(59,130,246,.15)}
.ls-icon svg{width:40px;height:40px}
.ls-title{font-size:30px;font-weight:900;color:#fff;letter-spacing:-.5px}
.ls-title span{color:var(--pri)}
.ls-sub{font-size:12px;color:var(--tx2);line-height:1.7}
.ls-divider{display:flex;align-items:center;gap:12px;width:300px}
.ls-divider span{font-size:11px;color:var(--tx3);white-space:nowrap}
.ls-divider::before,.ls-divider::after{content:'';flex:1;height:1px;background:var(--ln)}
.ls-cards{display:flex;gap:12px}
.ls-card{width:140px;padding:18px 14px;cursor:pointer;background:var(--sur);border:2px solid var(--ln2);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .2s}
.ls-card:hover{border-color:var(--pri);box-shadow:0 8px 32px rgba(59,130,246,.1);transform:translateY(-2px)}
.ls-card .flag{font-size:28px}
.ls-card .name{font-size:14px;font-weight:800;color:#fff}
.ls-card .sub{font-size:10px;color:var(--tx3)}

/* ─ APP ─ */
#APP{display:none;height:100vh}
#APP.show{display:flex}

/* ─ SIDEBAR ─ */
.sb{width:56px;flex-shrink:0;background:var(--bg1);border-left:1px solid var(--ln);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:2px;z-index:100}
[dir=ltr] .sb{border-left:none;border-right:1px solid var(--ln)}
.sb-logo{width:36px;height:36px;cursor:pointer;background:linear-gradient(135deg,var(--pri3),var(--pri4));border-radius:10px;margin-bottom:8px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 14px rgba(59,130,246,.15)}
.sb-logo svg{width:18px;height:18px}
.sb-sep{width:28px;height:1px;background:var(--ln);margin:4px 0}
.nv{width:40px;height:40px;border:none;border-radius:10px;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--tx3);position:relative}
.nv:hover{background:var(--sur);color:var(--tx)}
.nv.on{background:var(--prig);color:var(--pri);box-shadow:inset 0 0 0 1px rgba(59,130,246,.2)}
.nv svg{width:18px;height:18px;fill:currentColor}
.nv .tip{position:absolute;right:44px;z-index:200;background:var(--sur2);border:1px solid var(--ln2);color:var(--tx);font-family:var(--ff);font-size:10px;font-weight:600;padding:3px 7px;border-radius:5px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .12s;box-shadow:0 4px 16px rgba(0,0,0,.3)}
[dir=ltr] .nv .tip{right:auto;left:44px}
.nv:hover .tip{opacity:1}
.sb-bot{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:2px}
.api-btn{width:40px;height:40px;border:none;border-radius:10px;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx3);transition:all .15s;position:relative}
.api-btn:hover{background:var(--sur);color:var(--pri)}
.api-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.api-ind{position:absolute;bottom:7px;right:7px;width:6px;height:6px;border-radius:50%;background:var(--tx3);transition:all .25s}
.api-ind.ok{background:var(--grn);box-shadow:0 0 5px var(--grn)}
.api-ind.err{background:var(--red)}

/* ─ API POPUP ─ */
.api-pop{position:fixed;bottom:50px;right:62px;width:250px;z-index:500;background:var(--sur2);border:1px solid var(--ln3);border-radius:var(--r);padding:14px;box-shadow:0 16px 48px rgba(0,0,0,.5);display:none}
[dir=ltr] .api-pop{right:auto;left:62px}
.api-pop.open{display:block}
.api-pop h4{font-size:11px;font-weight:700;color:var(--pri);margin-bottom:8px}
.api-pop input{width:100%;background:var(--bg2);border:1px solid var(--ln2);color:var(--tx);padding:7px 9px;border-radius:var(--rs);font-family:monospace;font-size:11px;outline:none;transition:border .15s}
.api-pop input:focus{border-color:var(--pri)}
.api-pop-row{display:flex;align-items:center;gap:5px;margin-top:7px}
.api-pop-dot{width:6px;height:6px;border-radius:50%;background:var(--tx3);transition:all .25s}
.api-pop-dot.ok{background:var(--grn);box-shadow:0 0 5px var(--grn)}
.api-pop-dot.err{background:var(--red)}
.api-pop-txt{font-size:10px;color:var(--tx2)}
.api-pop p{font-size:9px;color:var(--tx3);margin-top:6px;line-height:1.6}

/* ─ MAIN ─ */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{height:48px;flex-shrink:0;background:rgba(14,23,41,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--ln);display:flex;align-items:center;padding:0 14px;gap:8px}
.tb-info h2{font-size:13px;font-weight:800;color:#fff;line-height:1}
.tb-info p{font-size:9px;color:var(--tx3);margin-top:2px}
.tb-right{margin-right:auto;display:flex;align-items:center}
[dir=ltr] .tb-right{margin-right:0;margin-left:auto}
.lchip{display:flex;align-items:center;gap:4px;background:var(--sur);border:1px solid var(--ln2);border-radius:16px;padding:3px 9px;font-size:10px;font-weight:600;color:var(--tx2);cursor:pointer;transition:all .15s}
.lchip:hover{border-color:var(--pri);color:var(--pri)}

/* ─ CONTENT ─ */
.content{flex:1;overflow:hidden;position:relative}
.vw{display:none;height:100%;flex-direction:column;overflow:hidden}
.vw.on{display:flex}
.scr{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.scr::-webkit-scrollbar{width:3px}
.scr::-webkit-scrollbar-thumb{background:var(--ln2);border-radius:3px}

/* ─ UI COMPONENTS ─ */
.shr{font-size:9px;font-weight:700;color:var(--pri);letter-spacing:1.2px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.shr::after{content:'';flex:1;height:1px;background:var(--ln)}
.card{background:var(--sur);border:1px solid var(--ln);border-radius:var(--r);overflow:hidden}
.ch{padding:12px 14px 0;display:flex;align-items:flex-start;gap:8px}
.ci{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ci svg{width:16px;height:16px}
.ct{font-size:13px;font-weight:800;color:#fff}
.cs{font-size:10px;color:var(--tx3);margin-top:1px}
.cb{padding:12px 14px}
.inp{width:100%;background:var(--bg2);border:1px solid var(--ln);color:var(--tx);padding:8px 10px;border-radius:var(--rs);font-size:12px;font-family:var(--ff);outline:none;transition:border .15s}
.inp:focus{border-color:var(--pri)}
.inp::placeholder{color:var(--tx3)}
select.inp option{background:var(--sur)}
.lbl{font-size:10px;font-weight:600;color:var(--tx2);margin-bottom:4px;display:block}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.btn{width:100%;padding:9px;background:linear-gradient(135deg,var(--pri2),var(--pri4));border:none;border-radius:var(--rs);color:#fff;font-family:var(--ff);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;box-shadow:0 2px 12px rgba(59,130,246,.1)}
.btn:hover{box-shadow:0 4px 20px rgba(59,130,246,.2);transform:translateY(-1px)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.gbtn{display:inline-flex;align-items:center;gap:4px;background:var(--sur);border:1px solid var(--ln2);color:var(--tx2);padding:6px 10px;border-radius:var(--rs);font-family:var(--ff);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.gbtn:hover{border-color:var(--pri);color:var(--pri)}
.chip{background:var(--sur);border:1px solid var(--ln);color:var(--tx2);padding:4px 9px;border-radius:16px;font-size:10px;font-family:var(--ff);font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.chipOn{background:var(--prig);border-color:var(--pri);color:var(--pri)}
.chip:hover{border-color:var(--pri2);color:var(--pri)}
.sp{width:12px;height:12px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:rot .5s linear infinite}
.sp-lg{width:24px;height:24px;border:2px solid rgba(59,130,246,.15);border-top-color:var(--pri);border-radius:50%;animation:rot .6s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.loading{display:none;flex-direction:column;align-items:center;gap:8px;padding:24px;text-align:center}
.loading.on{display:flex}
.loading p{font-size:11px;color:var(--tx3)}
.rbox{display:none;background:var(--sur);border:1px solid var(--ln2);border-radius:var(--r);overflow:hidden;animation:fup .2s ease}
.rbox.on{display:block}
@keyframes fup{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.rh{padding:8px 12px;border-bottom:1px solid var(--ln);display:flex;align-items:center;gap:6px;background:rgba(59,130,246,.02)}
.rbadge{font-size:8px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--pri);background:var(--prig);border:1px solid rgba(59,130,246,.15);padding:2px 6px;border-radius:3px}
.rbody{padding:12px;font-size:12px;line-height:1.85;color:var(--tx);white-space:pre-wrap;word-break:break-word}

/* ─ DASHBOARD ─ */
.hero{background:linear-gradient(135deg,#0c1a30,#112240,#0c1830);border:1px solid var(--ln2);border-radius:var(--r);padding:18px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50px;right:-50px;width:240px;height:240px;background:radial-gradient(circle,rgba(59,130,246,.06),transparent 70%);pointer-events:none}
[dir=ltr] .hero::before{right:auto;left:-50px}
.hero-lbl{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--pri);margin-bottom:6px}
.hero-ttl{font-size:20px;font-weight:900;color:#fff;line-height:1.15;letter-spacing:-.3px;margin-bottom:4px}
.hero-desc{font-size:11px;color:var(--tx2);line-height:1.7}
.hero-refs{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.rpill{font-size:8px;font-weight:700;color:rgba(59,130,246,.75);background:rgba(59,130,246,.04);border:1px solid rgba(59,130,246,.1);padding:2px 5px;border-radius:3px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.sc{background:var(--sur);border:1px solid var(--ln);border-radius:var(--rs);padding:10px;text-align:center}
.sv{font-size:20px;font-weight:800;font-family:'Plus Jakarta Sans',monospace;color:var(--pri)}
.sl{font-size:9px;color:var(--tx3);margin-top:1px;font-weight:600}
.qag{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.qa{background:var(--sur);border:1px solid var(--ln);border-radius:var(--rs);padding:10px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px}
.qa:hover{border-color:var(--pri2);transform:translateY(-1px)}
.qa-ic{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qa-ic svg{width:14px;height:14px}
.qa h4{font-size:11px;font-weight:700;color:#fff}
.qa p{font-size:9px;color:var(--tx3)}
.dash-chips{display:flex;gap:5px;flex-wrap:wrap}

/* ─ CHAT ─ */
.cw{flex:1;display:flex;flex-direction:column;overflow:hidden}
.cm{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.cm::-webkit-scrollbar{width:3px}
.cm::-webkit-scrollbar-thumb{background:var(--ln2);border-radius:3px}
.cwelcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:24px;text-align:center}
.cw-ic{width:56px;height:56px;background:rgba(59,130,246,.04);border:1px solid rgba(59,130,246,.12);border-radius:16px;display:flex;align-items:center;justify-content:center}
.cw-ic svg{width:26px;height:26px;fill:none;stroke:var(--pri);stroke-width:1.5}
.cw-t{font-size:15px;font-weight:900;color:#fff}
.cw-s{font-size:11px;color:var(--tx2);line-height:1.7;max-width:260px}
.msg{display:flex;gap:8px;max-width:88%;animation:fup .15s ease}
.msg.u{flex-direction:row-reverse;align-self:flex-end}
.msg.b{align-self:flex-start}
.av{width:28px;height:28px;border-radius:8px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center}
.msg.u .av{background:var(--pri3)}
.msg.b .av{background:linear-gradient(135deg,var(--pri3),var(--pri4));box-shadow:0 0 10px rgba(59,130,246,.12)}
.av svg{width:13px;height:13px;fill:currentColor}
.bbl{padding:8px 11px;border-radius:10px;font-size:12px;line-height:1.8;white-space:pre-wrap;word-break:break-word}
.msg.u .bbl{background:linear-gradient(135deg,var(--pri3),var(--pri4));color:#fff;border-radius:10px 2px 10px 10px}
[dir=ltr] .msg.u .bbl{border-radius:2px 10px 10px 10px}
.msg.b .bbl{background:var(--sur);border:1px solid var(--ln);border-radius:2px 10px 10px 10px;color:var(--tx)}
[dir=ltr] .msg.b .bbl{border-radius:10px 2px 10px 10px}
.btag{font-size:8px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--pri);background:var(--prig);border:1px solid rgba(59,130,246,.15);padding:1px 5px;border-radius:3px;margin-bottom:4px;display:inline-block}
.tw{display:flex;gap:8px;align-self:flex-start}
.tdw{background:var(--sur);border:1px solid var(--ln);border-radius:2px 10px 10px 10px;padding:10px 12px;display:flex;gap:3px;align-items:center}
.td{width:4px;height:4px;border-radius:50%;background:var(--pri);animation:tdot 1.2s infinite}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-4px);opacity:1}}
.ccr{display:flex;gap:4px;padding:6px 12px;overflow-x:auto;flex-shrink:0}
.ccr::-webkit-scrollbar{display:none}
.cia{display:flex;gap:6px;align-items:flex-end;padding:8px 12px;background:rgba(14,23,41,.97);border-top:1px solid var(--ln);flex-shrink:0}
.cta{flex:1;background:var(--sur);border:1px solid var(--ln);color:var(--tx);padding:8px 10px;border-radius:10px;font-size:12px;font-family:var(--ff);resize:none;outline:none;max-height:100px;line-height:1.6;transition:border .15s}
.cta:focus{border-color:var(--pri)}
.cta::placeholder{color:var(--tx3)}
.send{width:36px;height:36px;flex-shrink:0;background:linear-gradient(135deg,var(--pri2),var(--pri4));border:none;border-radius:9px;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;box-shadow:0 2px 10px rgba(59,130,246,.12)}
.send:hover{transform:scale(1.04)}
.send:disabled{opacity:.3;cursor:not-allowed;transform:none}
.send svg{width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round}

/* ─ DOSE TABS ─ */
.dtabs{display:flex;gap:3px;margin-bottom:10px;flex-wrap:wrap}
.dtab{flex:1;min-width:60px;padding:6px 4px;background:var(--sur);border:1px solid var(--ln);border-radius:var(--rs);font-family:var(--ff);font-size:11px;font-weight:600;color:var(--tx2);cursor:pointer;text-align:center;transition:all .15s}
.dtab.on{background:var(--prig);border-color:var(--pri);color:var(--pri)}
.dpanel{display:none}
.dpanel.on{display:block}
.dres{margin-top:8px;display:none;background:rgba(59,130,246,.03);border:1px solid rgba(59,130,246,.12);border-radius:var(--rs);padding:10px}
.dres.on{display:block}
.dres-v{font-size:18px;font-weight:800;color:var(--pri);font-family:'Plus Jakarta Sans',monospace;margin-bottom:4px}
.dres-s{font-size:10px;color:var(--tx3);line-height:1.75}
.dres-w{font-size:10px;color:#fde047;margin-top:6px;padding-top:6px;border-top:1px solid #422006;font-weight:600}

/* ─ QUIZ ─ */
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:8px}
.tb{background:var(--bg2);border:1px solid var(--ln);color:var(--tx2);padding:7px 4px;border-radius:var(--rs);font-family:var(--ff);font-size:10px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.tb.on{border-color:var(--pri);color:var(--pri);background:var(--prig)}
.qbox{background:var(--sur);border:1px solid var(--ln);border-radius:var(--r);padding:14px;display:none}
.qbox.on{display:block}
.qnum{font-family:'Plus Jakarta Sans',monospace;font-size:9px;color:var(--pri);margin-bottom:5px;font-weight:700}
.qtext{font-size:13px;font-weight:600;line-height:1.8;margin-bottom:10px;color:#fff}
.qchs{display:flex;flex-direction:column;gap:5px}
.qch{background:var(--bg2);border:1px solid var(--ln);border-radius:var(--rs);padding:8px 10px;font-family:var(--ff);font-size:11px;color:var(--tx);text-align:right;cursor:pointer;transition:all .15s}
[dir=ltr] .qch{text-align:left}
.qch:hover:not([disabled]){border-color:var(--ln2);background:var(--sur)}
.qch.ok{border-color:var(--grn);background:rgba(34,197,94,.06);color:#86efac}
.qch.no{border-color:var(--red);background:rgba(239,68,68,.06);color:#fca5a5}
.qexp{display:none;margin-top:8px;background:#0c2d48;border:1px solid #1e5a8a;border-radius:var(--rs);padding:10px;font-size:11px;line-height:1.8;color:#7dd3fc}
.qexp.on{display:block}
.srow{display:flex;gap:5px}
.sbdg{background:var(--sur);border:1px solid var(--ln);border-radius:5px;padding:4px 9px;font-family:'Plus Jakarta Sans',monospace;font-size:10px;color:var(--tx2)}
.sbdg b{color:var(--pri)}

/* ─ PROCEDURES ─ */
.pcg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.pcc{background:var(--sur);border:1px solid var(--ln);border-radius:var(--r);padding:12px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:9px}
.pcc:hover{border-color:var(--pri2);transform:translateY(-1px)}
.pc-ic{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

<script>
(function(){
"use strict";
try{
var D=JSON.parse(document.getElementById('D').textContent);
var S={key:'',lang:'ar',apiOpen:false,hist:[],msgs:0,qN:0,qR:0,qW:0,qAns:false,qTopic:'general'};
var GROQ='https://api.groq.com/openai/v1/chat/completions',MODEL='llama-3.1-70b-versatile';
var DRUGS=/*__DRUGS_PLACEHOLDER__*/[];
function esc(t){return t?String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):'';}
function $(id){return document.getElementById(id);}
function tx(id,t){var e=$(id);if(e)e.textContent=t;}
function gt(id){var e=$(id);return e?e.value.trim():'';}
function L(){return D[S.lang];}
function t(o){return typeof o==='object'?(o[S.lang==='ar'?'ar':'en']||o.ar||o.en||''):o;}

// ═══ LAUNCH ═══
function launch(lang){
  S.lang=lang;
  $('LS').classList.add('gone');
  $('APP').classList.add('show');
  document.documentElement.dir=lang==='ar'?'rtl':'ltr';
  document.documentElement.lang=lang;
  applyLang();buildProcCats();buildTopicBtns();buildDrugSelect();buildCalcs();
}
$('btn-ar').onclick=function(){launch('ar');};
$('btn-en').onclick=function(){launch('en');};

// ═══ APPLY LANGUAGE ═══
function applyLang(){
  var l=L();
  $('lfl').textContent=l.flag;$('lnm').textContent=l.fname;
  $('ci').placeholder=l.chatPH;$('ci').style.direction=S.lang==='ar'?'rtl':'ltr';
  tx('cwT',l.cwt);tx('cwS',l.cws);
  tx('heroLbl',l.hero.lbl);tx('heroTtl',l.hero.ttl);tx('heroDesc',l.hero.desc);
  tx('slMsg',l.sl.msg);tx('slQ',l.sl.q);tx('slSc',l.sl.sc);
  tx('qaH',l.quickAccess);tx('cqH',l.commonQ);
  tx('qa1t',l.qa.q1);tx('qa1s',l.qa.q1s);tx('qa2t',l.qa.q2);tx('qa2s',l.qa.q2s);
  tx('qa3t',l.qa.q3);tx('qa3s',l.qa.q3s);tx('qa4t',l.qa.q4);tx('qa4s',l.qa.q4s);
  tx('vitHdr',l.vitalsHdr);tx('normHdr',l.normalRanges);
  // Sidebar tips
  var tips=l.tips||{};
  Object.keys(tips).forEach(function(k){tx('tip-'+k,tips[k]);});
  // Page title
  var m=l.pages.dash;if(m){tx('pgT',m[0]);tx('pgS',m[1]);}
  tx('apt',l.apiEmpty);
  // Drug page
  $('drugQ').placeholder=l.drugPH;tx('drugBtn',l.drugSearch);
  // Dose page
  
  
  
  
  
  
  // Category select
  var cs=$('aiCat');cs.innerHTML='';
  var cats=l.cats||{};
  Object.keys(cats).forEach(function(k){var o=document.createElement('option');o.value=k;o.textContent=cats[k];cs.appendChild(o);});
  // Quiz
  tx('qBtn',l.newQ);tx('scl',l.score.r);tx('swl',l.score.w);tx('spl',l.score.p);
  // Chat chips
  var ccr=$('ccr');ccr.innerHTML='';
  (l.chips||[]).forEach(function(c){var b=document.createElement('button');b.className='chip';b.textContent=c;b.onclick=function(){quickAsk(c);};ccr.appendChild(b);});
  // Dash chips
  var dc=$('dChips');dc.innerHTML='';
  (l.chips||[]).forEach(function(c){var b=document.createElement('button');b.className='chip';b.textContent=c;b.onclick=function(){quickAsk(c);};dc.appendChild(b);});
}

// ═══ NAVIGATION ═══
function navTo(pg){
  document.querySelectorAll('.vw').forEach(function(v){v.classList.remove('on');});
  document.querySelectorAll('.nv[id^="nv-"]').forEach(function(b){b.classList.remove('on');});
  var vw=$('vw-'+pg);if(vw)vw.classList.add('on');
  var nv=$('nv-'+pg);if(nv)nv.classList.add('on');
  var m=L().pages[pg];if(m){tx('pgT',m[0]);tx('pgS',m[1]);}
  if(S.apiOpen)toggleApi();
}
['dash','chat','drugs','dose','quiz','proc','vitals'].forEach(function(pg){var b=$('nv-'+pg);if(b)b.onclick=function(){navTo(pg);};});
$('brandBtn').onclick=function(){navTo('dash');};
$('qa1').onclick=function(){navTo('chat');};$('qa2').onclick=function(){navTo('drugs');};
$('qa3').onclick=function(){navTo('proc');};$('qa4').onclick=function(){navTo('dose');};
$('langChip').onclick=function(){$('LS').classList.remove('gone');$('APP').classList.remove('show');};

// ═══ API KEY ═══

// ═══ GROQ API ═══
async function callGroq(msgs,temp,maxTok){
  if(!S.key)throw new Error(L().noKey2);
  if(!S.key.startsWith('gsk_'))throw new Error(S.lang==='ar'?'المفتاح يجب أن يبدأ بـ gsk_':'Key must start with gsk_');
  if(window.location.protocol==='file:')throw new Error(S.lang==='ar'?'الذكاء الاصطناعي يحتاج نشر الموقع على Vercel أولاً — لا يعمل من الملفات المحلية':'AI requires deploying to Vercel first — does not work from local files');
  try{
    var r=await fetch(GROQ,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.key},body:JSON.stringify({model:MODEL,messages:msgs,temperature:temp||.15,max_tokens:maxTok||1400})});
    if(!r.ok){var err=await r.json().catch(function(){return{};});var msg=err.error&&err.error.message||'HTTP '+r.status;if(r.status===401)msg=S.lang==='ar'?'مفتاح غير صحيح — تحقق من console.groq.com':'Invalid key — check console.groq.com';if(r.status===429)msg=S.lang==='ar'?'تجاوزت الحد — انتظر دقيقة':'Rate limited — wait a minute';throw new Error(msg);}
    var data=await r.json();if(!data.choices||!data.choices[0])throw new Error('Empty response');return data.choices[0].message.content;
  }catch(e){if(e.message==='Failed to fetch'||e.message==='Load failed')throw new Error(S.lang==='ar'?'فشل الاتصال — تحقق من الإنترنت والمفتاح':'Connection failed — check internet & API key');throw e;}
}

// ═══ BMI ═══
window.calcBMI=function(){
  var wt=parseFloat($('bmiWt').value),ht=parseFloat($('bmiHt').value),res=$('bmiRes');
  if(!wt||!ht){res.innerHTML='<div class="dres-v" style="color:var(--red)">Enter weight and height</div>';res.classList.add('on');return;}
  var bmi=(wt/((ht/100)*(ht/100))).toFixed(1);
  var cat,col;
  if(bmi<18.5){cat='Underweight';col='var(--amb)';}
  else if(bmi<25){cat='Normal';col='var(--grn)';}
  else if(bmi<30){cat='Overweight';col='var(--amb)';}
  else{cat='Obese';col='var(--red)';}
  res.innerHTML='<div class="dres-v" style="color:'+col+'">BMI: '+bmi+'</div><div class="dres-s">'+cat+'<br>Underweight &lt;18.5 | Normal 18.5-24.9 | Overweight 25-29.9 | Obese &ge;30</div><div class="dres-w">WHO BMI Classification</div>';
  res.classList.add('on');
};
// ═══ BSA (Mosteller) ═══
window.calcBSA=function(){
  var wt=parseFloat($('bsaWt').value),ht=parseFloat($('bsaHt').value),res=$('bsaRes');
  if(!wt||!ht){res.innerHTML='<div class="dres-v" style="color:var(--red)">Enter weight and height</div>';res.classList.add('on');return;}
  var bsa=Math.sqrt((wt*ht)/3600).toFixed(2);
  res.innerHTML='<div class="dres-v">BSA: '+bsa+' m\u00b2</div><div class="dres-s">Mosteller Formula: \u221a(weight \u00d7 height / 3600)<br>Average adult: 1.7-2.0 m\u00b2<br>Used for: Chemotherapy dosing, Burns (TBSA), Cardiac Index</div><div class="dres-w">Mosteller RD. N Engl J Med 1987</div>';
  res.classList.add('on');
};
// ═══ CrCl (Cockcroft-Gault) ═══
window.calcCrCl=function(){
  var age=parseFloat($('crAge').value),wt=parseFloat($('crWt').value),cr=parseFloat($('crSr').value),gen=$('crGen').value,res=$('crclRes');
  if(!age||!wt||!cr){res.innerHTML='<div class="dres-v" style="color:var(--red)">Enter all fields</div>';res.classList.add('on');return;}
  var crcl=((140-age)*wt)/(72*cr);if(gen==='f')crcl*=0.85;crcl=crcl.toFixed(1);
  var cat,col;
  if(crcl>=90){cat='Normal kidney function';col='var(--grn)';}
  else if(crcl>=60){cat='Mild impairment (Stage 2)';col='var(--amb)';}
  else if(crcl>=30){cat='Moderate impairment (Stage 3)';col='var(--amb)';}
  else if(crcl>=15){cat='Severe impairment (Stage 4)';col='var(--red)';}
  else{cat='Kidney failure (Stage 5)';col='var(--red)';}
  res.innerHTML='<div class="dres-v" style="color:'+col+'">CrCl: '+crcl+' mL/min</div><div class="dres-s">'+cat+'<br>Used for: Dose adjustment of renally-cleared drugs<br>'+
  (gen==='f'?'Female factor (\u00d70.85) applied':'Male formula used')+'</div><div class="dres-w">Cockcroft-Gault Formula | Verify with physician</div>';
  res.classList.add('on');
};

async function newQ(){
  var l=L();if(!S.key){alert(l.noKey);return;}
  var btn=$('qBtn');btn.disabled=true;btn.innerHTML='<div class="sp"></div>';S.qAns=false;
  var tn=l.topics||{},topic=tn[S.qTopic]||S.qTopic;
  var qs=S.lang==='ar'?'Generate ONE NCLEX-RN question in Arabic. Return ONLY valid JSON:\n{"q":"...","ch":["...","...","...","..."],"c":0,"e":"...with reference"}\nTopic: '+topic+'. Application level. Arabic text only.':'Generate ONE NCLEX-RN question in English. Return ONLY valid JSON:\n{"q":"...","ch":["...","...","...","..."],"c":0,"e":"...with reference"}\nTopic: '+topic+'. Application level. English only.';
  try{

    var q=JSON.parse(r.replace(/\x60\x60\x60json/g,'').replace(/\x60\x60\x60/g,'').trim());
    S.qN++;tx('s2',S.qN);tx('qNum','Q #'+S.qN);tx('qText',q.q);

}

function ansQ(ch,ok,exp,container){

}

      if(Array.isArray(choices)){choices.forEach(function(c,ci){
        var btn=document.createElement('button');btn.className='pqc';btn.textContent=c;
        btn.onclick=function(){if(ans)return;ans=true;qcs.querySelectorAll('.pqc').forEach(function(b,i){b.disabled=true;if(i===q.c)b.classList.add('ok');if(i===ci&&ci!==q.c)b.classList.add('no');});item.querySelector('.pqe').textContent=t(q.e);item.querySelector('.pqe').classList.add('on');};
        qcs.appendChild(btn);
      });}
      item.appendChild(qcs);var exp=document.createElement('div');exp.className='pqe';item.appendChild(exp);ql.appendChild(item);
    });qp.appendChild(ql);
  }
  s.appendChild(qp);
}

// ═══ VITALS ═══
var VR={hr:{l:60,h:100},rr:{l:12,h:20},temp:{l:36.5,h:37.5},spo2:{l:95,h:100},gcs:{l:13,h:15},bg:{l:70,h:110}};
var VN={hr:['Bradycardia','Normal','Tachycardia'],rr:['Bradypnea','Normal','Tachypnea'],temp:['Hypothermia','Normal','Fever'],spo2:['Hypoxia','Normal','Normal'],gcs:['Altered LOC','Normal','Normal'],bg:['Hypoglycemia','Normal','Hyperglycemia']};
window.ckv=function(id,v){
  if(id==='bp'){var sys=parseFloat($('vSys').value),dia=parseFloat($('vDia').value),el=$('vs-bp');if(!sys&&!dia){el.textContent='';el.className='vs';return;}var txt,cls;if(sys>180||dia>120){txt='HTN Crisis';cls='vc2';}else if(sys>140||dia>90){txt='Hypertension';cls='vw2';}else if(sys<90||dia<60){txt='Hypotension';cls='vw2';}else{txt='Normal';cls='vn2';}el.textContent=txt;el.className='vs '+cls;return;}
  var val=parseFloat(v),el=$('vs-'+id);if(!val){el.textContent='';el.className='vs';return;}
  var r=VR[id],n=VN[id],txt,cls;
  if(val<r.l){txt=n[0];cls=(id==='spo2'||id==='gcs')?'vc2':'vw2';}else if(val>r.h){txt=n[2];cls='vw2';}else{txt=n[1];cls='vn2';}
  el.textContent=txt;el.className='vs '+cls;
};

// ═══ INIT ═══
try{var k=localStorage.getItem('naik');if(k){$('apiIn').value=k;S.key=k;setDots('ok');}}catch(e){}
}catch(e){document.body.innerHTML='<div style="padding:20px;color:red;font-size:14px">Error: '+e.message+'<br>Line: '+(e.line||'?')+'</div>';}
})();
